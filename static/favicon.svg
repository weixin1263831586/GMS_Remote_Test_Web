      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
  </defs>

  <!-- Letter G - font size 70 -->
  <text x="32" y="58"
        font-family="Arial, Helvetica, sans-serif"
        font-size="70"
